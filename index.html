<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Transition приклади</title>
<style>

.box {
  width: 100px;
  height: 100px;
  background: blue;
  margin: 20px;
}


.box1 {
  transition: background 0.5s;
}
.box1:hover {
  background: red;
}


.box2 {
  transition: width 0.5s;
}
.box2:hover {
  width: 150px;
}


.box3 {
  transition: background 0.5s, width 0.5s;
}
.box3:hover {
  background: green;
  width: 150px;
}


.box4 {
  transition: background 0.5s 3s;
}

.box4:hover {
  background: orange;
}


.box5 {
  transition: background 0.5s, width 0.5s 0.5s;
}
.box5:hover {
  background: orange;
  width: 150px;
}

</style>
</head>
<body>

<div class="box box1"></div>
<div class="box box2"></div>
<div class="box box3"></div>
<div class="box box4"></div>
<div class="box box5"></div>

</body>
</html>
